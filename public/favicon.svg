<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>

  <!-- Center person (tallest, brightest) -->
  <circle cx="32" cy="20" r="6" fill="white"/>
  <path d="M22 42c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Left person -->
  <circle cx="16" cy="24" r="4.5" fill="rgba(255,255,255,0.75)"/>
  <path d="M8 42c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="rgba(255,255,255,0.75)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Right person -->
  <circle cx="48" cy="24" r="4.5" fill="rgba(255,255,255,0.75)"/>
  <path d="M40 42c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="rgba(255,255,255,0.75)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Checkmark badge bottom right -->
  <circle cx="50" cy="50" r="9" fill="#22c55e"/>
  <polyline points="45.5,50 48.5,53 54.5,47" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
